<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 3</title>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/granim/2.0.0/granim.min.js"></script>

    <script src="script.js" defer></script>
</head>
<body>
    <section>
        <canvas id="granim-left" class="color-canvas" width="30" height="30"></canvas>
        <h1>Help me remove my food allergies from this dish!!</h1>
        <canvas id="granim-right" class="color-canvas" width="30" height="30"></canvas>
    </section>
    <h2>(drag and drop each item out of the salad!)</h2>

    <img src="images/allergiessheet.png" id="allergies" alt="allergies guide">

    <div class="salad-container">
        <img src="images/salad.png" class="salad-img" alt="salad">
    
        <img src="images/shrimp.png" class="ingredient" id="shellfish1" alt="shrimp">
        <img src="images/shrimp.png" class="ingredient" id="shellfish2" alt="shrimp">
        <img src="images/shrimp.png" class="ingredient" id="shellfish3" alt="shrimp">
    
        <img src="images/cheese.png" class="ingredient" id="cheese1" alt="cheese">
        <img src="images/cheese.png" class="ingredient" id="cheese2" alt="cheese">
        <img src="images/cheese.png" class="ingredient" id="cheese3" alt="cheese">
    
        <img src="images/peanuts.png" class="ingredient" id="peanuts1" alt="peanuts">
        <img src="images/peanuts.png" class="ingredient" id="peanuts2" alt="peanuts">
        <img src="images/peanuts.png" class="ingredient" id="peanuts3" alt="peanuts">
    </div>

    <div id="success-modal" class="modal">
        <div class="modal-content">
            <h3>Mission Success!</h3>
            <p>The dish is now allergy-free.</p>
            <button id="reset-btn">Reset salad!</button>
        </div>
    </div>
</body>
</html>
