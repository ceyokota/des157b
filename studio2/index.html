<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 2</title>
    <link href="styles.css" rel="stylesheet">
    <script src="script.js" defer></script>
    
</head>
    <body>
        <section id="container">
            <h1>My Journey with Internship Hunting</h1>
            <h2>Hover over a column to see more details!</h2>
            
            <div class="main-content">
                <section id="chart-lines">
                    <div class="line-row"><span>60</span><div class="line"></div></div>
                    <div class="line-row"><span>40</span><div class="line"></div></div>
                    <div class="line-row"><span>20</span><div class="line"></div></div>
                    <div class="line-row"><span>0</span><div class="line"></div></div>
                </section>
        
                <section id="graph">
                    <div class="bar-group" data-month="August 2025">
                        <div class="bar" style="height: 341px;"></div> <p>Aug 2025</p>
                    </div>
                    <div class="bar-group" data-month="September 2025">
                        <div class="bar" style="height: 394px;"></div> <p>Sept 2025</p>
                    </div>
                    <div class="bar-group" data-month="October 2025">
                        <div class="bar" style="height: 307px;"></div> <p>Oct 2025</p>
                    </div>
                    <div class="bar-group" data-month="November 2025">
                        <div class="bar" style="height: 180px;"></div> <p>Nov 2025</p>
                    </div>
                    <div class="bar-group" data-month="December 2025">
                        <div class="bar" style="height: 180px;"></div> <p>Dec 2025</p>
                    </div>
                    <div class="bar-group" data-month="January 2026">
                        <div class="bar" style="height: 227px;"></div> <p>Jan 2026</p>
                    </div>
                    <div class="bar-group" data-month="February 2026">
                        <div class="bar" style="height: 380px;"></div> <p>Feb 2026</p>
                    </div>
                    <div class="bar-group" data-month="March 2026">
                        <div class="bar" style="height: 114px;"></div> <p>Mar 2026</p>
                    </div>
                    <div class="bar-group" data-month="April 2026">
                        <div class="bar" style="height: 33px;"></div>  <p>April 2026</p>
                    </div>
                </section>
            </div>
            <div id="textbox" class="hide">
                <p>I applied to x applications during month! Thats about x hours total or x hours per day!</p>
            </div>
        </section>
    </body>
</html>
